<svg xmlns="http://www.w3.org/2000/svg" width="640" height="420" viewBox="0 0 640 420">
<rect width="640" height="420" rx="28" fill="#fff5de"/>
<rect x="50" y="30" width="540" height="360" rx="22" fill="#f7f8fc" stroke="#1d1b18" stroke-width="5"/>
<text x="80" y="70" font-size="22" font-family="Arial" font-weight="900" fill="#244e8e">Chat compravendita</text>
<rect x="80" y="100" width="260" height="60" rx="18" fill="#dfe8ff"/>
<text x="100" y="126" font-size="16" font-family="Arial" fill="#1d1b18">Ti porto la console oggi.</text>
<text x="100" y="148" font-size="16" font-family="Arial" fill="#1d1b18">Pago con bonifico istantaneo.</text>
<rect x="300" y="180" width="240" height="56" rx="18" fill="#d5f4d9"/>
<text x="320" y="206" font-size="16" font-family="Arial" fill="#1d1b18">Ok, appena vedo l'accredito</text>
<text x="320" y="227" font-size="16" font-family="Arial" fill="#1d1b18">te la consegno.</text>
<rect x="80" y="255" width="270" height="58" rx="18" fill="#dfe8ff"/>
<text x="100" y="281" font-size="16" font-family="Arial" fill="#1d1b18">Tranquillo, ti faccio vedere</text>
<text x="100" y="303" font-size="16" font-family="Arial" fill="#1d1b18">subito la schermata della banca.</text>
<rect x="300" y="330" width="210" height="35" rx="16" fill="#ffe7d2"/>
<text x="320" y="353" font-size="16" font-family="Arial" fill="#1d1b18">I soldi non sono arrivati.</text>
</svg>