<text x="350" y="154" font-size="20" font-family="Arial" font-weight="700" fill="#1d1b18">Nome:</text>
<text x="434" y="154" font-size="24" font-family="Arial" font-weight="900" fill="#1d1b18">SIMONE L.</text>
<text x="350" y="194" font-size="20" font-family="Arial" font-weight="700" fill="#1d1b18">Caso:</text>
<text x="434" y="194" font-size="20" font-family="Arial" fill="#1d1b18">Aggressione al pub</text>
<text x="350" y="234" font-size="20" font-family="Arial" font-weight="700" fill="#1d1b18">Fatto:</text>
<text x="350" y="262" font-size="16" font-family="Arial" fill="#1d1b18">Pugno dopo una lite nel</text>
<text x="350" y="286" font-size="16" font-family="Arial" fill="#1d1b18">parcheggio del locale.</text>
<text x="350" y="316" font-size="16" font-family="Arial" fill="#1d1b18">La difesa invoca provocazione</text>
<text x="350" y="340" font-size="16" font-family="Arial" fill="#1d1b18">e reazione istintiva.</text>
