<text x="270" y="145" font-size="18" font-family="Arial" font-weight="700" fill="#1d1b18">Dichiarazione</text>
<text x="270" y="180" font-size="18" font-family="Arial" fill="#1d1b18">"Ho visto Simone spingere Matteo</text>
<text x="270" y="206" font-size="18" font-family="Arial" fill="#1d1b18">contro un'auto e poi colpirlo una</text>
<text x="270" y="232" font-size="18" font-family="Arial" fill="#1d1b18">volta al volto. Matteo urlava ma</text>
<text x="270" y="258" font-size="18" font-family="Arial" fill="#1d1b18">non stava colpendo in quel momento."</text>
