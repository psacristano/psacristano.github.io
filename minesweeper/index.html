<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>💎 Mines Casino</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="screen-flash" id="screenFlash"></div>

<header>
  <div class="logo">💣 MINES</div>
  <div class="header-right">
    <button class="mute-btn" id="muteBtn" onclick="toggleMute()">🔊</button>
    <div class="balance-pill">
      🪙 <span class="amt" id="balAmt">1.000</span>
    </div>
  </div>
</header>

<div class="main">

  <div class="stats">
    <div class="stat">
      <div class="stat-lbl">Moltiplicatore</div>
      <div class="stat-val c-gold" id="sMult">—</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">Cashout</div>
      <div class="stat-val c-green" id="sWin">—</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">Sicure</div>
      <div class="stat-val c-blue" id="sSafe">0 / 22</div>
    </div>
  </div>

  <div class="card grid-wrap">
    <div class="grid" id="grid"></div>
  </div>

  <div class="card controls">
    <div>
      <div class="field-lbl">Puntata 🪙</div>
      <div class="bet-row">
        <input type="number" inputmode="numeric" class="bet-input" id="betInput" value="50" min="1">
        <button class="chip" id="btnHalf"   onclick="adjustBet(0.5)">½</button>
        <button class="chip" id="btnDouble" onclick="adjustBet(2)">2×</button>
        <button class="chip" id="btnMax"    onclick="betMax()">Max</button>
      </div>
    </div>

    <div>
      <div class="field-lbl">Bombe 💣 — <span id="mineLabel">3</span></div>
      <div class="mine-grid" id="mineGrid"></div>
    </div>

    <div class="mult-strip hidden" id="multStrip">
      <span>Prossima: <span id="nextMultVal">—</span></span>
      <span>Massimo: <span id="maxMultVal">—</span></span>
    </div>

    <button class="action-btn play" id="actionBtn" onclick="handleAction()">🚀 &nbsp;GIOCA</button>
  </div>

  <div class="card goal-card">
    <div class="goal-row">
      <span class="goal-lbl">🎯 Obiettivo: 1.000.000 🪙</span>
      <span class="goal-pct" id="goalPct">0,1%</span>
    </div>
    <div class="goal-track">
      <div class="goal-fill" id="goalFill" style="width:0.1%"></div>
    </div>
  </div>

</div>

<div class="overlay hidden" id="overlay">
  <div class="dialog">
    <div class="dlg-icon"       id="dlgIcon">💎</div>
    <div class="dlg-title win"  id="dlgTitle">HAI VINTO!</div>
    <div class="dlg-amount win" id="dlgAmt">+0 🪙</div>
    <div class="dlg-picks"      id="dlgPicks"></div>
    <div class="dlg-sub"        id="dlgSub"></div>
    <button class="action-btn play" style="font-size:.9rem;padding:12px" id="dlgBtn">Continua →</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
